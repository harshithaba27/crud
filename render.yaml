services:
  - type: web
    name: flask-supabase-crud
    env: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn main:app
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OLLAMA_MODEL
        value: llama3.2:1b
      - key: PYTHON_VERSION
        value: 3.11.0
